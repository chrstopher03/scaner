<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escáner de Productos</title>
<link rel="icon" href="300.jpeg">

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    padding:20px;
}

h1,h2{
    text-align:center;
    margin-bottom:20px;
}

.btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    background:#1d4ed8;
}

.controles{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-bottom:20px;
}

#reader{
    width:100%;
    max-width:850px;
    height:350px;
    margin:auto;
    border:4px solid #222;
    border-radius:12px;
    overflow:hidden;
    background:#000;
}

#estado{
    text-align:center;
    margin-top:10px;
    color:#555;
}

#resultado{
    display:none;
    max-width:900px;
    margin:25px auto;
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 3px 15px rgba(0,0,0,.15);
}

.detalle{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    align-items:center;
}

.detalle img{
    width:320px;
    max-width:100%;
    object-fit:contain;
}

.info{
    flex:1;
}

.nombre{
    font-size:30px;
    font-weight:bold;
    margin-bottom:10px;
}

.precio{
    font-size:50px;
    color:green;
    font-weight:bold;
}

.codigo{
    color:#666;
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h3{
    margin-bottom:15px;
}

.card button{
    margin-top:10px;
}

svg{
    width:100%;
}

</style>
</head>
<body>

<h1>Escáner de Productos</h1>

<div class="controles">
    <button class="btn" onclick="iniciarCamara()">
        📷 Iniciar Cámara
    </button>

    <button class="btn" onclick="descargarTodos()">
        ⬇ Descargar Todos los Códigos
    </button>
</div>

<div id="reader"></div>

<div id="estado">
    Esperando inicio del escáner...
</div>

<div id="resultado">

    <div class="detalle">

        <img id="fotoProducto" src="">

        <div class="info">

            <div class="nombre" id="nombreProducto"></div>

            <div class="precio" id="precioProducto"></div>

            <div class="codigo" id="codigoProducto"></div>

        </div>

    </div>

</div>

<h2>Productos</h2>

<div class="grid" id="catalogo"></div>

<script>

const productos = [

{
    codigo:"100001",
    nombre:"Mobil Parmazone",
    precio:"780",
    imagen:"6.jpeg"
},

{
    codigo:"100002",
    nombre:"Mobil Heavy Duty",
    precio:"780",
    imagen:"7.jpeg"
},

{
    codigo:"100003",
    nombre:"Mobil ATF D/M",
    precio:"350",
    imagen:"8.jpeg"
},


{
    codigo:"100004",
    nombre:"American Automatic transmission",
    precio:"180",
    imagen:"11.jpeg"
},

{
    codigo:"100005",
    nombre:"Mobil Delvac Extreme SAE 15W-40 API CK-4.",
    precio:"1700",
    imagen:"12.jpeg"
},

{
    codigo:"100006",
    nombre:"Mobil Delvac Extreme SAE 10W-30 API CK-4 ",
    precio:"2400",
    imagen:"60.jpeg"
},


{
    codigo:"100007",
    nombre:"Motor Oil SAE 50",
    precio:"140",
    imagen:"14.jpeg"
},

{
    codigo:"100008",
    nombre:"Mobil Super moto",
    precio:"300",
    imagen:"15.jpeg"
},

{
    codigo:"100009",
    nombre:"Havoline SAE 20W-50",
    precio:"280",
    imagen:"16.jpeg"
},


{
    codigo:"1000010",
    nombre:"TEC service Power Steering Fluid",
    precio:"200",
    imagen:"17.jpeg"
},

{
    codigo:"100011",
    nombre:"Havoline 2-cicle",
    precio:"350",
    imagen:"18.jpeg"
},

{
    codigo:"1000012",
    nombre:"Auto Super Heavy Duty Azul",
    precio:"90",
    imagen:"19.jpeg"
}

];

const catalogo = document.getElementById("catalogo");

productos.forEach((producto,index)=>{

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `
        <h3>${producto.nombre}</h3>

        <svg id="barcode${index}"></svg>

        <p>${producto.codigo}</p>

        <button class="btn"
            onclick="descargarCodigo('barcode${index}','${producto.codigo}')">
            Descargar Código
        </button>
    `;

    catalogo.appendChild(card);

    JsBarcode(
        `#barcode${index}`,
        producto.codigo,
        {
            format:"CODE128",
            width:2,
            height:80,
            displayValue:false
        }
    );

});

function mostrarProducto(codigo){

    const producto =
    productos.find(p => p.codigo === codigo);

    if(!producto) return;

    document.getElementById("resultado").style.display="block";

    document.getElementById("fotoProducto").src =
    producto.imagen;

    document.getElementById("nombreProducto").textContent =
    producto.nombre;

    document.getElementById("precioProducto").textContent =
    "C$ " + producto.precio;

    document.getElementById("codigoProducto").textContent =
    "Código: " + producto.codigo;

    document.getElementById("resultado")
    .scrollIntoView({
        behavior:"smooth"
    });

}

let iniciado = false;

function iniciarCamara(){

    if(iniciado) return;

    iniciado = true;

    document.getElementById("estado").textContent =
    "Escáner activo...";

    Quagga.init({

        inputStream:{
            type:"LiveStream",
            target:document.querySelector("#reader"),
            constraints:{
                facingMode:"environment"
            }
        },

        decoder:{
            readers:[
                "code_128_reader",
                "ean_reader",
                "ean_8_reader"
            ]
        }

    },function(err){

        if(err){

            console.error(err);

            document.getElementById("estado").textContent =
            "Error iniciando cámara";

            return;
        }

        Quagga.start();

    });

    Quagga.onDetected(function(data){

        const codigo = data.codeResult.code;

        mostrarProducto(codigo);

    });

}

function descargarCodigo(svgId,nombre){

    const svg = document.getElementById(svgId);

    const datos =
    new XMLSerializer().serializeToString(svg);

    const canvas =
    document.createElement("canvas");

    const ctx =
    canvas.getContext("2d");

    const img =
    new Image();

    img.onload = function(){

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img,0,0);

        const enlace =
        document.createElement("a");

        enlace.download = nombre + ".png";

        enlace.href =
        canvas.toDataURL("image/png");

        enlace.click();
    };

    img.src =
    "data:image/svg+xml;base64," +
    btoa(unescape(encodeURIComponent(datos)));
}

function descargarTodos(){

    productos.forEach((producto,index)=>{

        setTimeout(()=>{

            descargarCodigo(
                "barcode"+index,
                producto.codigo
            );

        },index*500);

    });

}

</script>

</body>
</html>
