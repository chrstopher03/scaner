    display:flex;
    flex-wrap:wrap;
    gap:20px;
    align-items:center;
}

.detalle img{
    width:420px;
    height:420px;
    max-width:100%;

    background:white;
    border-radius:12px;

.info{

.nombre{

.precio{

.codigo{

}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h3{
    margin-bottom:15px;
}

.card button{
    margin-top:10px;
}

svg{
    width:100%;
}

const catalogo = document.getElementById("catalogo");

productos.forEach((producto,index)=>{

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `
        <h3>${producto.nombre}</h3>
        <svg id="barcode${index}"></svg>
        <p>${producto.codigo}</p>

        <button class="btn"
        onclick="descargarCodigo('barcode${index}','${producto.codigo}')">
            Descargar Código
        </button>
    `;

    catalogo.appendChild(card);

    JsBarcode(
        `#barcode${index}`,
        producto.codigo,
        {
            format:"CODE128",
            width:2,
            height:80,
            margin:10,
            displayValue:true
        }
    );

});
function mostrarProducto(codigo){

    const producto = productos.find(
        p => p.codigo === codigo
    );

    if(!producto){

        document.getElementById("estado").textContent =
        "Producto no encontrado: " + codigo;

        return;
    }

    document.getElementById("resultado").style.display =
    "block";

    const foto =
    document.getElementById("fotoProducto");

    // Limpiar eventos anteriores
    foto.onload = null;
    foto.onerror = null;

    foto.onload = function(){

        document.getElementById("estado").textContent =
        "Producto encontrado";

        console.log(
            "Imagen cargada:",
            producto.imagen
        );

    };

    foto.onerror = function(){

        console.error(
            "No se encontró:",
            producto.imagen
        );

        this.src = "300.jpeg";

        document.getElementById("estado").textContent =
        "Imagen no encontrada: " +
        producto.imagen;

    };

    // Fuerza recarga de la imagen
    foto.src = "";
    foto.src =
    producto.imagen +
    "?v=" +
    new Date().getTime();

    document.getElementById("nombreProducto").textContent =
    producto.nombre;

    document.getElementById("precioProducto").textContent =
    "C$ " + producto.precio;

    document.getElementById("codigoProducto").textContent =
    "Código: " + producto.codigo;

    document.getElementById("resultado")
    .scrollIntoView({
        behavior:"smooth"
    });

}

let iniciado = false;
let ultimoCodigo = "";

function iniciarCamara(){

    if(iniciado) return;

    iniciado = true;

    document.getElementById("estado").textContent =
    "Escáner activo...";

    Quagga.init({

        inputStream:{
            type:"LiveStream",
            target:document.querySelector("#reader"),
            constraints:{
                facingMode:"environment",
                width:{min:640},
                height:{min:480}
            }
        },

        locator:{
            patchSize:"large",
            halfSample:false
        },

        decoder:{
            readers:[
                "code_128_reader",
                "ean_reader",
                "ean_8_reader"
            ]
        }

    },function(err){

        if(err){

            console.error(err);

            document.getElementById("estado").textContent =
            "Error iniciando cámara";

            iniciado = false;

            return;
        }

        Quagga.start();

    });

    Quagga.onDetected(function(data){

        const codigo = data.codeResult.code;

        if(codigo === ultimoCodigo) return;

        ultimoCodigo = codigo;

        document.getElementById("estado").textContent =
        "Código detectado: " + codigo;

        mostrarProducto(codigo);

    });

}

function detenerCamara(){

    if(!iniciado) return;

    Quagga.stop();

    iniciado = false;

    document.getElementById("estado").textContent =
    "Cámara detenida";

}
async function descargarTodosPDF() {

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
        orientation: "portrait",
        unit: "mm",
        format: "a4"
    });

    const anchoEtiqueta = 60;
    const altoEtiqueta = 25;

    let x = 10;
    let y = 10;

    const columnas = 3;

    for (let i = 0; i < productos.length; i++) {

        const svg = document.getElementById("barcode" + i);

        const datos =
        new XMLSerializer().serializeToString(svg);

        const img = new Image();

        await new Promise(resolve => {

            img.onload = () => {

                const canvas =
                document.createElement("canvas");

                const ctx =
                canvas.getContext("2d");

                canvas.width = img.width;
                canvas.height = img.height;

                ctx.drawImage(img, 0, 0);

                const png =
                canvas.toDataURL("image/png");

                pdf.addImage(
                    png,
                    "PNG",
                    x,
                    y,
                    anchoEtiqueta,
                    altoEtiqueta
                );

                pdf.setFontSize(8);

                pdf.text(
                    productos[i].codigo,
                    x + 15,
                    y + altoEtiqueta + 4
                );

                resolve();

            };

            img.src =
            "data:image/svg+xml;base64," +
            btoa(unescape(encodeURIComponent(datos)));

        });

        const columna = (i + 1) % columnas;

        if (columna === 0) {

            x = 10;
            y += 35;

        } else {

            x += 65;

        }

        if (y > 250) {

            pdf.addPage();

            x = 10;
            y = 10;

        }

    }

    pdf.save("codigos_barras.pdf");

}
/* =========================

let deferredPrompt;

window.addEventListener(
    "beforeinstallprompt",
    (e)=>{

        e.preventDefault();

        deferredPrompt = e;

        const boton =
        document.getElementById("btnInstalar");

        if(boton){
            boton.style.display =
            "inline-block";
        }

    }
);

document.addEventListener(
    "DOMContentLoaded",
    ()=>{

        const boton =
        document.getElementById("btnInstalar");

        if(!boton) return;

        boton.addEventListener(
            "click",
            async ()=>{

                if(!deferredPrompt) return;

                deferredPrompt.prompt();

                await deferredPrompt.userChoice;

                deferredPrompt = null;

                boton.style.display =
                "none";

            }
        );

    }
);
