}
@keyframes scanMove {

    100% { top: 100%; }

productos.forEach((producto,index)=>{

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <h3>${producto.nombre}</h3>
        <svg id="barcode${index}"></svg>
        <p>${producto.codigo}</p>

        <button class="btn"
            onclick="descargarCodigo('barcode${index}','${producto.codigo}')">

        </button>
    `;

    catalogo.appendChild(card);

    JsBarcode(
        `#barcode${index}`,
        producto.codigo,
        {
            format:"CODE128",
            width:2,
            height:80,
            displayValue:false
        }
    );
});


/* =========================
   📦 MOSTRAR PRODUCTO
========================= */
function mostrarProducto(codigo){

    const producto = productos.find(p => p.codigo === codigo);
    if(!producto) return;

    document.getElementById("resultado").style.display = "block";

    document.getElementById("fotoProducto").src = producto.imagen;
    document.getElementById("nombreProducto").textContent = producto.nombre;
    document.getElementById("precioProducto").textContent = "C$ " + producto.precio;
    document.getElementById("codigoProducto").textContent = "Código: " + producto.codigo;

    document.getElementById("resultado").scrollIntoView({
        behavior:"smooth"
    });
}


/* =========================
   🔊 SONIDOS
========================= */
function beepOk(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "square";
    osc.frequency.value = 900;

    gain.gain.value = 0.08;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.12);
}

function beepError(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sawtooth";
    osc.frequency.value = 220;

    gain.gain.value = 0.12;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.25);
}

function vibrar(){
    if(navigator.vibrate){
        navigator.vibrate(120);
    }
}


/* =========================
   🔦 FLASH
========================= */
let flash = false;

async function toggleFlash(){

    try{

        const video = document.querySelector("#reader video");
        if(!video) return;

        const stream = video.srcObject;
        const track = stream.getVideoTracks()[0];

        const caps = track.getCapabilities();

        if(!caps.torch){
            alert("Tu dispositivo no soporta flash");
            return;
        }

        flash = !flash;

        await track.applyConstraints({
            advanced: [{ torch: flash }]
        });

    }catch(e){
        console.log("Flash error", e);
    }
}


/* =========================
   ⚡ ESCÁNER CONTROL
========================= */
let iniciado = false;
let bloqueado = false;
let ultimoCodigo = "";
let ultimoTiempo = 0;
let timeoutError = null;


/* =========================
   🚨 ERROR SI NO DETECTA
========================= */
function resetErrorTimer(){

    clearTimeout(timeoutError);

    timeoutError = setTimeout(()=>{

        if(iniciado && !bloqueado){

            beepError();
            vibrar();

            document.getElementById("estado").textContent =
            "No se detecta código...";

            resetErrorTimer();
        }

    }, 3000);
}
/* =========================
   📷 INICIAR CÁMARA
========================= */
function iniciarCamara(){

    if(iniciado) return;

    iniciado = true;
    bloqueado = false;

    document.getElementById("estado").textContent =
    "Escaneando...";

    Quagga.offDetected();

    Quagga.init({

        inputStream: {
            type: "LiveStream",
            target: document.querySelector("#reader"),

            constraints: {
                facingMode: "environment",
                width: 1280,
                height: 720
            }
        },

        locator: {
            halfSample: true,
            patchSize: "medium"
        },

        numOfWorkers: navigator.hardwareConcurrency || 4,

        frequency: 20,

        decoder: {
            readers: [
                "code_128_reader",
                "ean_reader",
                "ean_8_reader"
            ]
        },

        locate: true

    }, function(err){

        if(err){
            console.error(err);
            document.getElementById("estado").textContent =
            "Error iniciando cámara";
            iniciado = false;
            return;
        }

        Quagga.start();

        document.getElementById("estado").textContent =
        "Apunte al código";

        resetErrorTimer();
    });

    Quagga.onDetected(function(data){

        if(bloqueado) return;

        const codigo = data.codeResult.code;

        if(!codigo) return;

        const ahora = Date.now();

        if(
            codigo === ultimoCodigo &&
            (ahora - ultimoTiempo) < 1200
        ){
            return;
        }

        ultimoCodigo = codigo;
        ultimoTiempo = ahora;

        bloqueado = true;

        beepOk();
        vibrar();

        document.getElementById("estado").textContent =
        "Código detectado: " + codigo;

        Quagga.stop();

        iniciado = false;

        mostrarProducto(codigo);

        setTimeout(() => {
            iniciarCamara();
        }, 1000);

    });

}
async function descargarTodosPDF() {

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
        orientation: "portrait",
        unit: "mm",
        format: "a4"
    });

    const anchoEtiqueta = 60;
    const altoEtiqueta = 25;

    let x = 10;
    let y = 10;

    const columnas = 3;

    for (let i = 0; i < productos.length; i++) {

        const svg = document.getElementById("barcode" + i);

        if (!svg) continue;

        const svgData = new XMLSerializer().serializeToString(svg);

        const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });

        const url = URL.createObjectURL(svgBlob);

        const img = new Image();

        await new Promise((resolve) => {

            img.onload = () => {

                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");

                canvas.width = img.width || 200;
                canvas.height = img.height || 80;

                ctx.drawImage(img, 0, 0);

                const png = canvas.toDataURL("image/png");

                pdf.addImage(
                    png,
                    "PNG",
                    x,
                    y,
                    anchoEtiqueta,
                    altoEtiqueta
                );

                pdf.setFontSize(8);

                pdf.text(
                    productos[i].codigo,
                    x + 10,
                    y + altoEtiqueta + 4
                );

                URL.revokeObjectURL(url);

                resolve();
            };

            img.onerror = () => {
                console.log("Error cargando barcode " + i);
                resolve(); // no rompe el PDF
            };

            img.src = url;
        });

        const columna = (i + 1) % columnas;

        if (columna === 0) {
            x = 10;
            y += 35;
        } else {
            x += 65;
        }

        if (y > 250) {
            pdf.addPage();
            x = 10;
            y = 10;
        }
    }

    pdf.save("codigos_barras.pdf");
}/* =========================
   VERSION APP
========================= */

const APP_VERSION = "1.0.2";

/* =========================
   INSTALAR APP (PWA)
========================= */

let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {

    e.preventDefault();
    deferredPrompt = e;

    const boton = document.getElementById("btnInstalar");

    if (boton) {
        boton.style.display = "inline-block";
    }

});

document.addEventListener("DOMContentLoaded", () => {

    const boton = document.getElementById("btnInstalar");

    if (!boton) return;

    boton.addEventListener("click", async () => {

        if (!deferredPrompt) return;

        deferredPrompt.prompt();

        await deferredPrompt.userChoice;

        deferredPrompt = null;

        boton.style.display = "none";

    });

});

/* =========================
   SERVICE WORKER
========================= */

if ("serviceWorker" in navigator) {

    window.addEventListener("load", async () => {

        try {

            const registro =
                await navigator.serviceWorker.register(
                    `./service-worker.js?v=${APP_VERSION}`
                );

            console.log(
                "Service Worker instalado",
                APP_VERSION
            );

            registro.addEventListener("updatefound", () => {

                const nuevoSW = registro.installing;

                nuevoSW.addEventListener(
                    "statechange",
                    () => {

                        if (
                            nuevoSW.state === "installed" &&
                            navigator.serviceWorker.controller
                        ) {

                            console.log(
                                "Nueva versión disponible"
                            );

                            if (
                                confirm(
                                    "Hay una nueva versión disponible. ¿Desea actualizar?"
                                )
                            ) {

                                window.location.reload();

                            }

                        }

                    }
                );

            });

        } catch (err) {

            console.error(err);

        }

    });

}
